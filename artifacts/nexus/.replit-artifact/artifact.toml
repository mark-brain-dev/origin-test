kind = "web"
previewPath = "/"
title = "Nexus OS"
version = "1.0.0"
id = "artifacts/nexus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/nexus run dev"

[services.env]
PORT = "5173"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nexus", "run", "build"]
publicDir = "artifacts/nexus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
